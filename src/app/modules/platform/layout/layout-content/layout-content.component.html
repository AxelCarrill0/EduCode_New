<div class="layout-container">

  <div class="sidebar">
    <h2>EduCode</h2>
    <ul>
      <li><a routerLink="/platform/dashboard" routerLinkActive="active-link"><i class="pi pi-home"></i>
          Dashboard</a></li>
      <li><a routerLink="/platform/modules" routerLinkActive="active-link"><i class="pi pi-book"></i>
          Módulos</a></li>
      <li><a routerLink="/platform/laboratory" routerLinkActive="active-link"><i class="pi pi-code"></i>
          Laboratorio</a></li>
      <li><a routerLink="/platform/progress" routerLinkActive="active-link"><i class="pi pi-chart-bar"></i>
          Progreso</a></li>
      <li><a routerLink="/platform/settings" routerLinkActive="active-link"><i class="pi pi-cog"></i>
          Ajustes</a></li>

    </ul>

  </div>

  <div class="content">

    <div class="topbar-content">
      <p-tag value="Plataforma Educativa" severity="success"></p-tag>
      <div class="topbar-content">
        <div>
          <h3>Hola, Usuario 👋</h3>
        </div>
        <div class="topbar-button">
          <p-avatar
            label="A"
            shape="circle"
            size="large">
          </p-avatar>

        <p-button
          label="Cerrar Sesión"
          routerLink="/"
          icon="pi pi-sign-out"
          severity="success"
          [outlined]="true">
        </p-button>
        </div>
    </div>
    </div>

    <div class="page-content">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
