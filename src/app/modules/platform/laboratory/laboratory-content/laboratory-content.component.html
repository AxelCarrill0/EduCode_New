<div class="laboratory-container">

  <div class="laboratory-header">
    <div class="laboratory-header-text">
      <h1>Laboratorio</h1>
      <p>Practica tus habilidades de programación.</p>
    </div>
    <p-button class="execute-button" icon="pi pi-play" label="Ejecutar"></p-button>
  </div>

  <div class="laboratory-content">

    <div class="editor-section">
      <h3>Editor de Código</h3>
      <div class="language-selector">

    <label>Lenguaje</label>

    <select>
      <option>Python</option>
      <option>Java</option>
      <option>JavaScript</option>
      <option>C++</option>
    </select>

      </div>
      <textarea spellcheck="false">
      # Escribe tu código aquí
      
      print("Hola Mundo")
      </textarea>
    </div>

    <div class="console-section">

  <div class="console-header">
    <h3>Consola</h3>
    <span class="status">
      ● Listo
    </span>
  </div>
  <div class="console-output">
    <div class="console-line">
      >>> Ejecutando programa...
    </div>
    <div class="console-line success">
      Hola Mundo
    </div>
    <div class="console-line info">
      Proceso finalizado correctamente.
    </div>
  </div>

</div>

  </div>

</div>
